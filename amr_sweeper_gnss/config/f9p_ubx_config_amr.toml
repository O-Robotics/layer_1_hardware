# CFG_MSGOUT_UBX_NAV_SAT_USB: UBX-NAV-SAT output rate on USB.
# CFG_MSGOUT_UBX_NAV_SIG_USB: UBX-NAV-SIG output rate on USB.
# CFG_MSGOUT_UBX_NAV_STATUS_UART1: UBX-NAV-STATUS output rate on UART1.
# CFG_MSGOUT_UBX_NAV_STATUS_UART2: UBX-NAV-STATUS output rate on UART2.
# CFG_MSGOUT_UBX_NAV_STATUS_USB: UBX-NAV-STATUS output rate on USB.
# CFG_MSGOUT_UBX_NAV_SVIN_USB: UBX-NAV-SVIN output rate on USB.
# CFG_MSGOUT_UBX_NAV_TIMEUTC_USB: UBX-NAV-TIMEUTC output rate on USB.
# CFG_MSGOUT_UBX_NAV_VELECEF_USB: UBX-NAV-VELECEF output rate on USB.
# CFG_MSGOUT_UBX_NAV_VELNED_USB: UBX-NAV-VELNED output rate on USB.
# CFG_MSGOUT_UBX_RXM_COR_UART1: UBX-RXM-COR output rate on UART1.
# CFG_MSGOUT_UBX_RXM_COR_UART2: UBX-RXM-COR output rate on UART2.
# CFG_MSGOUT_UBX_RXM_COR_USB: UBX-RXM-COR output rate on USB.
# CFG_MSGOUT_UBX_RXM_MEASX_USB: UBX-RXM-MEASX output rate on USB.
# CFG_MSGOUT_UBX_RXM_RAWX_USB: UBX-RXM-RAWX output rate on USB.
# CFG_MSGOUT_UBX_RXM_SFRBX_USB: UBX-RXM-SFRBX output rate on USB.
# CFG_MSGOUT_UBX_RXM_RTCM_USB: UBX-RXM-RTCM output rate on USB.
# CFG_MSGOUT_UBX_RXM_SPARTN_USB: UBX-RXM-SPARTN output rate on USB.
# CFG_MSGOUT_UBX_SEC_SIGLOG_USB: UBX-SEC-SIGLOG output rate on USB.
# CFG_MSGOUT_UBX_SEC_SIG_USB: UBX-SEC-SIG output rate on USB.
# CFG_NAVHPG_DGNSSMODE: DGNSS/RTK operating mode selection.
# CFG_NAVSPG_DYNMODEL: Navigation dynamic model selection.
# CFG_NAVSPG_FIXMODE: 2D/3D/auto fix mode selection.
# CFG_NAVSPG_INIFIX3D: Initial 3D fix requirement.
# CFG_NAVSPG_UTCSTANDARD: UTC standard selection.
# CFG_ODO_COGLPGAIN: Odometer course-over-ground low-pass gain.
# CFG_ODO_COGMAXPOSACC: Max position accuracy for odometer COG logic.
# CFG_ODO_COGMAXSPEED: Max speed for odometer COG logic.
# CFG_ODO_OUTLPCOG: Odometer low-pass output on course over ground. Removed
#   from the managed include list because FWVER=HPG 1.32 never returns it in
#   CFG-VALGET and leaves the node in degraded mode.
# CFG_ODO_OUTLPVEL: Odometer low-pass output on velocity. Removed for the same
#   reason as CFG_ODO_OUTLPCOG.
# CFG_ODO_PROFILE: Odometer dynamic profile selection. Removed because this
#   receiver firmware never returns it in CFG-VALGET.
# CFG_ODO_USE_COG: Enable odometer-assisted course over ground. Removed because
#   this receiver firmware never returns it in CFG-VALGET.
# CFG_ODO_USE_ODO: Enable odometer input usage. Removed because this receiver
#   firmware never returns it in CFG-VALGET.
# CFG_ODO_VELLPGAIN: Odometer velocity low-pass gain. Removed because this
#   receiver firmware never returns it in CFG-VALGET.
# CFG_RATE_MEAS: Measurement period.
# CFG_RATE_NAV: Navigation solution ratio.
# CFG_RATE_TIMEREF: Navigation solution time reference selection. Removed
#   because this receiver firmware never returns it in CFG-VALGET.
# CFG_SEC_JAMDET_SENSITIVITY_HI: High-sensitivity jamming detector mode.
#   Removed because this receiver firmware never returns it in CFG-VALGET.
# CFG_SEC_SPOOFDET_SIM_SIG_DIS: Simulated-signal spoof detection suppression.
#   Removed because this receiver firmware never returns it in CFG-VALGET.
# CFG_SIGNAL_BDS_B1_ENA: BeiDou B1 signal tracking enable.
# CFG_SIGNAL_BDS_B2_ENA: BeiDou B2 signal tracking enable.
# CFG_SIGNAL_BDS_ENA: Overall BeiDou constellation tracking enable.
# CFG_SIGNAL_GAL_E1_ENA: Galileo E1 signal tracking enable.
# CFG_SIGNAL_GAL_E5B_ENA: Galileo E5b signal tracking enable.
# CFG_SIGNAL_GAL_ENA: Overall Galileo constellation tracking enable.
# CFG_SIGNAL_GLO_ENA: Overall GLONASS constellation tracking enable.
# CFG_SIGNAL_GLO_L1_ENA: GLONASS L1 signal tracking enable.
# CFG_SIGNAL_GLO_L2_ENA: GLONASS L2 signal tracking enable.
# CFG_SIGNAL_GPS_ENA: Overall GPS constellation tracking enable.
# CFG_SIGNAL_GPS_L1CA_ENA: GPS L1 C/A signal tracking enable.
# CFG_SIGNAL_GPS_L2C_ENA: GPS L2C signal tracking enable.
# CFG_SIGNAL_QZSS_ENA: Overall QZSS constellation tracking enable.
# CFG_SIGNAL_QZSS_L1CA_ENA: QZSS L1 C/A signal tracking enable.
# CFG_SIGNAL_QZSS_L1S_ENA: QZSS L1S signal tracking enable.
# CFG_SIGNAL_QZSS_L2C_ENA: QZSS L2C signal tracking enable.
# CFG_SIGNAL_SBAS_ENA: SBAS constellation tracking enable.
# CFG_SIGNAL_SBAS_L1CA_ENA: SBAS L1 C/A signal tracking enable.
# CFG_SPARTN_USE_SOURCE: SPARTN correction source selection. Removed because
#   this receiver firmware never returns it in CFG-VALGET.
# CFG_TMODE_ECEF_X: Survey/fixed-mode ECEF X coordinate.
# CFG_TMODE_ECEF_X_HP: High-precision ECEF X coordinate component.
# CFG_TMODE_ECEF_Y: Survey/fixed-mode ECEF Y coordinate.
# CFG_TMODE_ECEF_Y_HP: High-precision ECEF Y coordinate component.
# CFG_TMODE_ECEF_Z: Survey/fixed-mode ECEF Z coordinate.
# CFG_TMODE_ECEF_Z_HP: High-precision ECEF Z coordinate component.
# CFG_TMODE_FIXED_POS_ACC: Fixed-position accuracy estimate.
# CFG_TMODE_HEIGHT: Survey/fixed-mode geodetic height.
# CFG_TMODE_HEIGHT_HP: High-precision height component.
# CFG_TMODE_LAT: Survey/fixed-mode latitude.
# CFG_TMODE_LAT_HP: High-precision latitude component.
# CFG_TMODE_LON: Survey/fixed-mode longitude.
# CFG_TMODE_LON_HP: High-precision longitude component.
# CFG_TMODE_MODE: Time mode selection.
# CFG_TMODE_POS_TYPE: Fixed-position coordinate type.
# CFG_TMODE_SVIN_ACC_LIMIT: Survey-in accuracy limit.
# CFG_TMODE_SVIN_MIN_DUR: Minimum survey-in duration.
# CFG_UART1INPROT_NMEA: NMEA input protocol on UART1.
# CFG_UART1INPROT_RTCM3X: RTCM3 input protocol on UART1.
# CFG_UART1INPROT_SPARTN: SPARTN input protocol on UART1.
# CFG_UART1INPROT_UBX: UBX input protocol on UART1.
# CFG_UART1OUTPROT_NMEA: NMEA output protocol on UART1.
# CFG_UART1OUTPROT_RTCM3X: RTCM3 output protocol on UART1.
# CFG_UART1OUTPROT_UBX: UBX output protocol on UART1.
# CFG_UART2INPROT_NMEA: NMEA input protocol on UART2.
# CFG_UART2INPROT_RTCM3X: RTCM3 input protocol on UART2.
# CFG_UART2INPROT_SPARTN: SPARTN input protocol on UART2.
# CFG_UART2INPROT_UBX: UBX input protocol on UART2.
# CFG_UART2OUTPROT_NMEA: NMEA output protocol on UART2.
# CFG_UART2OUTPROT_RTCM3X: RTCM3 output protocol on UART2.
# CFG_UART2OUTPROT_UBX: UBX output protocol on UART2.
# CFG_UART2_BAUDRATE: UART2 baud rate.
# CFG_USBINPROT_NMEA: NMEA input protocol on USB.
# CFG_USBINPROT_RTCM3X: RTCM3 input protocol on USB.
# CFG_USBINPROT_UBX: UBX input protocol on USB.
# CFG_USBOUTPROT_NMEA: NMEA output protocol on USB.
# CFG_USBOUTPROT_RTCM3X: RTCM3 output protocol on USB.
# CFG_USBOUTPROT_UBX: UBX output protocol on USB.

