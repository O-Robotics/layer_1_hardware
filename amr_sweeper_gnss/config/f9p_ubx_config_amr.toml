# CFG_MSGOUT_RTCM_3X_TYPE1097_USB: RTCM 1097 output rate on USB.
# CFG_MSGOUT_RTCM_3X_TYPE1124_UART2: RTCM 1124 output rate on UART2.
# CFG_MSGOUT_RTCM_3X_TYPE1127_USB: RTCM 1127 output rate on USB.
# CFG_MSGOUT_RTCM_3X_TYPE1230_UART2: RTCM 1230 output rate on UART2.
# CFG_MSGOUT_RTCM_3X_TYPE1230_USB: RTCM 1230 output rate on USB.
# CFG_MSGOUT_RTCM_3X_TYPE4072_0_UART2: RTCM 4072.0 output rate on UART2.
# CFG_MSGOUT_UBX_MON_COMMS_USB: UBX-MON-COMMS output rate on USB.
# CFG_MSGOUT_UBX_NAV_CLOCK_USB: UBX-NAV-CLOCK output rate on USB.
# CFG_MSGOUT_UBX_NAV_COV_UART1: UBX-NAV-COV output rate on UART1.
# CFG_MSGOUT_UBX_NAV_COV_UART2: UBX-NAV-COV output rate on UART2.
# CFG_MSGOUT_UBX_NAV_COV_USB: UBX-NAV-COV output rate on USB.
# CFG_MSGOUT_UBX_NAV_DOP_USB: UBX-NAV-DOP output rate on USB.
# CFG_MSGOUT_UBX_NAV_EOE_USB: UBX-NAV-EOE output rate on USB.
# CFG_MSGOUT_UBX_NAV_HPPOSECEF_USB: UBX-NAV-HPPOSECEF output rate on USB.
# CFG_MSGOUT_UBX_NAV_HPPOSLLH_UART1: UBX-NAV-HPPOSLLH output rate on UART1.
# CFG_MSGOUT_UBX_NAV_HPPOSLLH_UART2: UBX-NAV-HPPOSLLH output rate on UART2.
# CFG_MSGOUT_UBX_NAV_HPPOSLLH_USB: UBX-NAV-HPPOSLLH output rate on USB.
# CFG_MSGOUT_UBX_NAV_ODO_USB: UBX-NAV-ODO output rate on USB.
# CFG_MSGOUT_UBX_NAV_ORB_USB: UBX-NAV-ORB output rate on USB.
