# F9P UBX Configuration
# AMR Sweeper override for ZED-F9P on FWVER=HPG 1.32 / PROTVER=27.31.
# This file intentionally lives outside the vendored ublox_dgnss dependency.
#
# Important note about "default" in the inline comments below:
# - This TOML only controls whether a UBX config item is part of the managed include list.
# - It does not assign the final runtime value by itself.
# - "Upstream default: included" means the item was present in the vendored
#   ublox_dgnss F9P include list.
# - "Upstream default: included, removed here" means the item was present upstream
#   but is intentionally excluded in this AMR-owned override.

[metadata]
device_family = "F9P"
description = "AMR Sweeper ZED-F9P configuration with unsupported keys removed"
version = "1.1"
parameter_count = 115

