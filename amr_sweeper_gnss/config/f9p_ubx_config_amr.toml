# F9P UBX Configuration
# AMR Sweeper override for ZED-F9P on FWVER=HPG 1.32 / PROTVER=27.31.
# This file intentionally lives outside the vendored ublox_dgnss dependency.
#
# Parser constraint:
# - The vendored ublox_dgnss TOML parser only accepts plain quoted strings in
#   the include array below.
# - Keep all documentation in comments above the array, never inline with array
#   entries.
#
# Parameter glossary
# CFG_INFMSG_NMEA_USB: NMEA informational message verbosity on USB.
# CFG_INFMSG_UBX_USB: UBX informational message verbosity on USB.
# CFG_MSGOUT_RTCM_3X_TYPE1005_USB: RTCM 1005 output rate on USB.
# CFG_MSGOUT_RTCM_3X_TYPE1074_UART2: RTCM 1074 output rate on UART2.
